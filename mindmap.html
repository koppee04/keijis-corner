<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Is Keiji?</title>
<style>
:root {
  --bg:      #080a0e;
  --surface: #0e1218;
  --border:  #1e2840;
  --accent:  #e06500;
  --text:    #e06500;
  --muted:   #4488cc;
  --faint:   #2a3a5a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Consolas', 'Courier New', monospace;
  user-select: none;
}

/* SVG fills the entire viewport */
#svg-wrap {
  position: fixed;
  inset: 0;
  cursor: grab;
  touch-action: none;  /* let pointer events handle touch, not browser scroll */
}
#svg-wrap svg {
  width: 100%; height: 100%;
  display: block;
}

/* Zoom group has the smooth CSS transition */
#zoom-group {
  transform: translate(0px,0px) scale(1);
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
  transform-origin: 0px 0px;
}

/* Header — floating overlay, top center */
.hdr {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  background: rgba(212,217,222,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 18px 5px;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}
.hdr-sub {
  font-size: 8px;
  letter-spacing: 0.4em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.hdr-title {
  color: var(--text);
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
#hdr-active {
  margin-top: 3px;
  font-size: 8px;
  color: var(--faint);
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
  min-height: 11px;
}

/* Legend — floating overlay, bottom center */
#legend {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-wrap: wrap;
  gap: 5px 7px;
  justify-content: center;
  max-width: 92vw;
}
.pill {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 3px 9px;
  border-radius: 4px;
  border: 1px solid;
  font-family: inherit;
  transition: all 0.2s;
  background: rgba(212,217,222,0.86);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

/* Hint line above legend */
#hint {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  color: var(--faint);
  font-size: 8px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="svg-wrap"></div>

<div class="hdr">
  <div class="hdr-sub">Portrait of a Mind</div>
  <div class="hdr-title">★ Who Is Keiji? ★</div>
  <div id="hdr-active">tap a branch to zoom · drag to pan</div>
</div>

<div id="legend"></div>
<div id="hint">⚡ craft feeds ◬ the dream via off-grid electrical work</div>

<script>
// Branch colors darkened for the light gray (#d4d9de) surface
const DATA = [
  { id:"faith",      label:"Faith",          angle:-90,  color:"#9e7418", icon:"✦",
    children:["Antiochian Orthodox","Prayer & Liturgy","Apologetics","Comparative Religion","Christian Martyrdom","WMSCOG Discernment"] },
  { id:"philosophy", label:"Philosophy",     angle:-50,  color:"#2e6ea0", icon:"◈",
    children:["Philosophy of Religion","Moral Arguments","Epistemology","Kierkegaard","Barth & Tillich","William James"] },
  { id:"history",    label:"History",        angle:-10,  color:"#6a38a8", icon:"⊕",
    children:["Early Church Geography","Christmas & Easter Origins","Cognitive Science of Religion","Civilizational History","Endō — Silence","Depth Psychology"] },
  { id:"arts",       label:"Arts & Language", angle:30,  color:"#c04010", icon:"◉",
    children:["Music","Art","Literature","Film","Spanish → Fluency","Deep Reading"] },
  { id:"family",     label:"Family & Love",  angle:70,   color:"#aa2858", icon:"♡",
    children:["Rianna — Partner","Family","Community","Parish Life","Loyalty","Rootedness"] },
  { id:"dream",      label:"The Dream",      angle:110,  color:"#1a7840", icon:"◬",
    children:["Off-Grid Homestead","Self-Sufficiency","Land & Nature","Building Things","Intentional Living","Freedom from Systems"] },
  { id:"fitness",    label:"Fitness",        angle:150,  color:"#207848", icon:"◎",
    children:["Home Calisthenics","Muscle & Weight Gain","Upper / Lower Split","Upper Delt Focus","Ankle Stability","6-Day Training Week"] },
  { id:"craft",      label:"Craft & Trade",  angle:190,  color:"#b06810", icon:"⚡",
    children:["Electrician Career","Skilled Craftsmanship","Hands-On Work","Electrical Systems","Off-Grid Power ↗","Building w/ Purpose"] },
  { id:"values",     label:"Values & Mind",  angle:230,  color:"#3a5898", icon:"◇",
    children:["Intellectual Rigor","Source Integrity","Critical Thinking","Faith ↔ Reason","Scholarly Depth","Lifelong Learning"] },
];

const CX = 470, CY = 470, BR = 175, LR = 315, SPREAD = 30;
const ZOOM_FOCUS_R = 235, ZOOM_SCALE = 2.15;
const SURF = '#d4d9de', PAGE_BG = '#c8cfd6', RING = 'rgba(0,0,0,0.07)';
const T_DARK = '#18202a', T_MID = '#5a6878', T_DIM = '#9aa4ae', ORG = '#d45f00';

let activeId  = null;
let panX = 0, panY = 0;
let isDragging = false, hasMoved = false;
let dragStart = {x:0,y:0}, panStart = {x:0,y:0};

function polar(deg, r) {
  const a = deg * Math.PI / 180;
  return { x: Math.cos(a) * r, y: Math.sin(a) * r };
}

const NS = 'http://www.w3.org/2000/svg';
function mkEl(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

let svgNode; // filled by buildSVG

// ── Build SVG structure once ────────────────────────────────────────
function buildSVG() {
  const svg = mkEl('svg', { viewBox:'0 0 940 940', preserveAspectRatio:'xMidYMid meet' });
  svgNode = svg;

  /* defs */
  const defs = mkEl('defs');
  DATA.forEach(b => {
    const g = mkEl('radialGradient', { id:`rg-${b.id}`, cx:'50%', cy:'50%', r:'50%' });
    g.append(
      mkEl('stop', { offset:'0%',   'stop-color':b.color, 'stop-opacity':'0.22' }),
      mkEl('stop', { offset:'100%', 'stop-color':b.color, 'stop-opacity':'0'   })
    );
    defs.appendChild(g);
  });
  const cg = mkEl('radialGradient', { id:'cg', cx:'50%', cy:'50%', r:'50%' });
  cg.append(
    mkEl('stop', { offset:'0%',   'stop-color':ORG, 'stop-opacity':'0.18' }),
    mkEl('stop', { offset:'100%', 'stop-color':ORG, 'stop-opacity':'0'   })
  );
  defs.appendChild(cg);
  const flt = mkEl('filter', { id:'sg', x:'-40%', y:'-40%', width:'180%', height:'180%' });
  const fb  = mkEl('feGaussianBlur', { stdDeviation:'3', result:'b' });
  const fm  = mkEl('feMerge');
  fm.append(mkEl('feMergeNode', { in:'b' }), mkEl('feMergeNode', { in:'SourceGraphic' }));
  flt.append(fb, fm); defs.appendChild(flt);
  svg.appendChild(defs);

  /* bg rect — outside pan-group, covers full viewBox, catches deselect clicks */
  const bgr = mkEl('rect', { id:'bg-rect', x:'0', y:'0', width:'940', height:'940', fill:'transparent' });
  bgr.addEventListener('click', () => { if (!hasMoved) toggle(null); });
  svg.appendChild(bgr);

  /* pan-group — translated on drag (no CSS transition, immediate) */
  const pg = mkEl('g', { id:'pan-group' });
  svg.appendChild(pg);

  /* zoom-group — animated CSS transform (transition defined in CSS) */
  const zg = mkEl('g', { id:'zoom-group' });
  pg.appendChild(zg);

  /* bg rings */
  [78,152,232,316].forEach(r =>
    zg.appendChild(mkEl('circle', { cx:CX, cy:CY, r, fill:'none', stroke:RING, 'stroke-width':'1' }))
  );

  /* lines layer */
  DATA.forEach(b => {
    const bp = polar(b.angle, BR);
    const bx = CX+bp.x, by = CY+bp.y;
    const grp = mkEl('g', { id:`L-${b.id}` });
    grp.appendChild(mkEl('circle', { id:`GL-${b.id}`, cx:bx, cy:by, r:80,
      fill:`url(#rg-${b.id})`, opacity:'0' }));
    grp.appendChild(mkEl('line', { id:`ML-${b.id}`, x1:CX, y1:CY, x2:bx, y2:by,
      stroke:b.color, 'stroke-width':'1.5', 'stroke-opacity':'0.40' }));
    const llg = mkEl('g', { id:`LL-${b.id}` });
    b.children.forEach((_,i) => {
      const sa = b.angle - SPREAD*(b.children.length-1)/2;
      const lp = polar(sa+i*SPREAD, LR);
      llg.appendChild(mkEl('line', { x1:bx, y1:by, x2:CX+lp.x, y2:CY+lp.y,
        stroke:b.color, 'stroke-width':'1.2', 'stroke-opacity':'0.20' }));
    });
    grp.appendChild(llg);
    zg.appendChild(grp);
  });

  /* craft-dream dashed arc */
  const dr = DATA.find(b=>b.id==='dream'), cr = DATA.find(b=>b.id==='craft');
  const dp = polar(dr.angle,BR), cp2 = polar(cr.angle,BR);
  const dax=CX+dp.x, day=CY+dp.y, cax=CX+cp2.x, cay=CY+cp2.y;
  zg.appendChild(mkEl('path', { id:'arc',
    d:`M ${dax} ${day} Q ${(dax+cax)/2*0.82+CX*0.18} ${(day+cay)/2*0.82+CY*0.18} ${cax} ${cay}`,
    stroke:'#1a7840','stroke-width':'1', fill:'none','stroke-opacity':'0.30','stroke-dasharray':'5 4' }));

  /* center */
  zg.appendChild(mkEl('circle', { cx:CX, cy:CY, r:76, fill:'url(#cg)' }));
  zg.appendChild(mkEl('circle', { cx:CX, cy:CY, r:54, fill:PAGE_BG,
    stroke:ORG, 'stroke-width':'2', 'stroke-opacity':'0.9' }));
  zg.appendChild(mkEl('circle', { cx:CX, cy:CY, r:46, fill:'none',
    stroke:ORG, 'stroke-width':'0.6', 'stroke-opacity':'0.3' }));
  const ct1 = mkEl('text', { x:CX, y:CY-6, 'text-anchor':'middle', fill:T_DARK,
    'font-size':'18', 'font-family':"Consolas,'Courier New',monospace",
    'font-weight':'bold', 'letter-spacing':'2' });
  ct1.textContent = 'KEIJI'; zg.appendChild(ct1);
  const ct2 = mkEl('text', { x:CX, y:CY+13, 'text-anchor':'middle', fill:ORG,
    'font-size':'9', 'letter-spacing':'3' });
  ct2.textContent = '✦ ✦ ✦'; zg.appendChild(ct2);

  /* branch nodes + leaves */
  DATA.forEach(b => {
    const bp = polar(b.angle, BR);
    const bx = CX+bp.x, by = CY+bp.y;
    const bg = mkEl('g', { id:`B-${b.id}` });
    bg.style.cursor = 'pointer';
    bg.addEventListener('click', e => { if (hasMoved) return; e.stopPropagation(); toggle(b.id); });

    bg.appendChild(mkEl('circle', { id:`BC-${b.id}`, cx:bx, cy:by, r:30,
      fill:SURF, stroke:b.color, 'stroke-width':'1.8', 'stroke-opacity':'0.70' }));
    const ic = mkEl('text', { id:`BI-${b.id}`, x:bx, y:by-6, 'text-anchor':'middle',
      fill:b.color, 'font-size':'13', 'pointer-events':'none' });
    ic.textContent = b.icon; bg.appendChild(ic);

    if (b.label.includes(' ')) {
      const ws = b.label.split(' '), mid = Math.ceil(ws.length/2);
      [[ws.slice(0,mid).join(' '), by+7],[ws.slice(mid).join(' '), by+16]].forEach(([txt,y]) => {
        const t = mkEl('text', { class:'BL', 'data-bid':b.id, x:bx, y,
          'text-anchor':'middle', fill:T_MID, 'font-size':'7',
          'font-family':"Consolas,'Courier New',monospace",
          'letter-spacing':'0.3', 'pointer-events':'none' });
        t.textContent = txt; bg.appendChild(t);
      });
    } else {
      const t = mkEl('text', { class:'BL', 'data-bid':b.id, x:bx, y:by+10,
        'text-anchor':'middle', fill:T_MID, 'font-size':'7.5',
        'font-family':"Consolas,'Courier New',monospace",
        'letter-spacing':'0.3', 'pointer-events':'none' });
      t.textContent = b.label; bg.appendChild(t);
    }

    const lg = mkEl('g', { id:`BLV-${b.id}`, opacity:'0.35' });
    lg.style.transition = 'opacity 0.35s';
    b.children.forEach((ch,i) => {
      const sa = b.angle - SPREAD*(b.children.length-1)/2;
      const lp = polar(sa+i*SPREAD, LR);
      const lx=CX+lp.x, ly=CY+lp.y;
      const anc = lp.x>10?'start':lp.x<-10?'end':'middle';
      const ox  = lp.x>10?10:lp.x<-10?-10:0;
      const oy  = lp.y>10?10:lp.y<-10?-5:4;
      const lf = mkEl('g');
      lf.appendChild(mkEl('circle', { cx:lx, cy:ly, r:4, fill:b.color, opacity:'0.85' }));
      const lt = mkEl('text', { x:lx+ox, y:ly+oy, 'text-anchor':anc, fill:T_MID,
        'font-size':'8', 'font-family':"Consolas,'Courier New',monospace", 'letter-spacing':'0.2' });
      lt.textContent = ch; lf.appendChild(lt); lg.appendChild(lf);
    });
    bg.appendChild(lg); zg.appendChild(bg);
  });

  attachDrag(svg);
  document.getElementById('svg-wrap').appendChild(svg);
}

// ── Drag / Pan setup ────────────────────────────────────────────────
function svgScale() {
  const ctm = svgNode && svgNode.getScreenCTM();
  return ctm ? ctm.a : (svgNode ? svgNode.clientWidth/940 : 1);
}

function applyPan() {
  document.getElementById('pan-group').style.transform = `translate(${panX}px,${panY}px)`;
}

function setCursor(c) {
  document.getElementById('svg-wrap').style.cursor = c;
}

function attachDrag(svg) {
  // Pointer events + setPointerCapture = drag works even when pointer
  // leaves the iframe mid-drag (the old window.mousemove approach breaks
  // inside iframes the moment the cursor exits the frame boundary).
  svg.addEventListener('pointerdown', e => {
    if (e.button !== 0 && e.pointerType === 'mouse') return;
    isDragging = true; hasMoved = false;
    dragStart = {x:e.clientX, y:e.clientY};
    panStart  = {x:panX, y:panY};
    svg.setPointerCapture(e.pointerId);   // lock events to this element
    setCursor('grabbing');
  });

  svg.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasMoved = true;
    const s = svgScale();
    panX = panStart.x + dx / s;
    panY = panStart.y + dy / s;
    applyPan();
  });

  svg.addEventListener('pointerup', () => {
    isDragging = false;
    setCursor(activeId ? 'zoom-out' : 'grab');
  });

  svg.addEventListener('pointercancel', () => {
    isDragging = false;
    setCursor(activeId ? 'zoom-out' : 'grab');
  });
}

// ── Update visual state ─────────────────────────────────────────────
function updateState() {
  /* zoom transform */
  const zg = document.getElementById('zoom-group');
  if (activeId) {
    const b = DATA.find(x=>x.id===activeId);
    const pt = polar(b.angle, ZOOM_FOCUS_R);
    const fx = CX+pt.x, fy = CY+pt.y;
    zg.style.transform = `translate(${CX}px,${CY}px) scale(${ZOOM_SCALE}) translate(${-fx}px,${-fy}px)`;
  } else {
    zg.style.transform = 'translate(0px,0px) scale(1)';
  }

  /* header subtitle */
  const sub = document.getElementById('hdr-active');
  if (activeId) {
    const b = DATA.find(x=>x.id===activeId);
    sub.textContent = `${b.icon}  ${b.label.toUpperCase()}  ${b.icon}`;
    sub.style.color = b.color;
  } else {
    sub.textContent = 'tap a branch to zoom · drag to pan';
    sub.style.color = '';
  }

  /* arc */
  document.getElementById('arc').setAttribute('stroke-opacity', activeId ? '0.10' : '0.30');

  /* per-branch */
  DATA.forEach(b => {
    const on  = activeId === b.id;
    const dim = activeId !== null && !on;

    document.getElementById(`GL-${b.id}`).setAttribute('opacity', on ? '1' : '0');

    const ml = document.getElementById(`ML-${b.id}`);
    ml.setAttribute('stroke-width',   on ? '2.2' : '1.5');
    ml.setAttribute('stroke-opacity', on ? '0.95' : activeId ? '0.10' : '0.40');

    document.getElementById(`LL-${b.id}`).querySelectorAll('line').forEach(l =>
      l.setAttribute('stroke-opacity', on ? '0.55' : activeId ? '0.04' : '0.20')
    );

    const bc = document.getElementById(`BC-${b.id}`);
    bc.setAttribute('r',              on ? '35' : '30');
    bc.setAttribute('fill',           on ? b.color+'22' : SURF);
    bc.setAttribute('stroke-opacity', dim ? '0.18' : on ? '1' : '0.70');
    bc.setAttribute('stroke-width',   on ? '2.2' : '1.8');
    bc.setAttribute('filter',         on ? 'url(#sg)' : '');

    document.getElementById(`BI-${b.id}`)
      .setAttribute('fill', dim ? b.color+'55' : b.color);

    document.querySelectorAll(`.BL[data-bid="${b.id}"]`).forEach(t =>
      t.setAttribute('fill', dim ? T_DIM : on ? T_DARK : T_MID)
    );

    const lv = document.getElementById(`BLV-${b.id}`);
    lv.setAttribute('opacity', on ? '1' : activeId ? '0.08' : '0.35');
    lv.querySelectorAll('text').forEach(t =>
      t.setAttribute('fill', on ? T_DARK : T_MID)
    );
  });

  setCursor(activeId ? 'zoom-out' : 'grab');
  renderLegend();
}

function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  DATA.forEach(b => {
    const on  = activeId === b.id;
    const dim = activeId !== null && !on;
    const p = document.createElement('div');
    p.className = 'pill';
    p.style.borderColor = on ? b.color : activeId ? b.color+'40' : b.color+'70';
    p.style.background  = on ? b.color+'20' : 'rgba(212,217,222,0.88)';
    p.style.opacity     = dim ? '0.4' : '1';
    p.innerHTML = `<span style="color:${b.color};font-size:11px">${b.icon}</span>`
                + `<span style="color:${on?T_DARK:T_MID};font-size:9px;letter-spacing:0.5px">${b.label}</span>`;
    p.addEventListener('click', () => toggle(b.id));
    leg.appendChild(p);
  });
}

function toggle(id) {
  activeId = (id===null || activeId===id) ? null : id;
  // reset pan so zoom-centering is correct
  panX = 0; panY = 0; applyPan();
  updateState();
}

buildSVG();
updateState();
</script>
</body>
</html>
