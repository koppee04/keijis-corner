<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Is Keiji?</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0B0D16;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Georgia, 'Times New Roman', serif;
  padding: 28px 12px 36px;
  user-select: none;
}

.header { text-align: center; margin-bottom: 10px; }
.header-sub {
  font-size: 10px;
  letter-spacing: 0.4em;
  color: #C9A84C;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.header-title { color: #EAE6DA; font-size: 26px; letter-spacing: 0.06em; }
#header-subtitle {
  margin-top: 6px;
  font-size: 9px;
  color: #383530;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.3s;
  min-height: 16px;
}

.svg-container {
  width: 100%;
  max-width: 860px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
.svg-container svg { width: 100%; height: auto; display: block; }

/* The zoom group uses CSS transition; must stay in DOM */
#zoom-group {
  transform: translate(0px, 0px) scale(1);
  transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  transform-origin: 0px 0px;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 12px;
  justify-content: center;
  margin-top: 16px;
  max-width: 720px;
}
.legend-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid;
  transition: all 0.25s;
}

.footer {
  margin-top: 14px;
  color: #2E2C28;
  font-size: 9px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.8;
}
.footer-sub { color: #3E3C36; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Portrait of a Mind</div>
  <div class="header-title">Who Is Keiji?</div>
  <div id="header-subtitle">tap a branch to zoom in</div>
</div>

<div class="svg-container" id="svg-container"></div>
<div class="legend" id="legend"></div>

<div class="footer">
  Tap branch or pill to zoom · Tap background to zoom out
  <br>
  <span class="footer-sub">- - -  ⚡ Craft feeds ◬ The Dream via off-grid electrical work  - - -</span>
</div>

<script>
const DATA = [
  { id:"faith",      label:"Faith",         angle:-90,  color:"#C9A84C", icon:"✦",
    children:["Antiochian Orthodox","Prayer & Liturgy","Apologetics","Comparative Religion","Christian Martyrdom","WMSCOG Discernment"] },
  { id:"philosophy", label:"Philosophy",    angle:-50,  color:"#7EB8D4", icon:"◈",
    children:["Philosophy of Religion","Moral Arguments","Epistemology","Kierkegaard","Barth & Tillich","William James"] },
  { id:"history",    label:"History",       angle:-10,  color:"#B07CC6", icon:"⊕",
    children:["Early Church Geography","Christmas & Easter Origins","Cognitive Science of Religion","Civilizational History","Endō — Silence","Depth Psychology"] },
  { id:"arts",       label:"Arts & Language",angle:30,  color:"#E8836A", icon:"◉",
    children:["Music","Art","Literature","Film","Spanish → Fluency","Deep Reading"] },
  { id:"family",     label:"Family & Love", angle:70,   color:"#E87CA0", icon:"♡",
    children:["Rianna — Partner","Family","Community","Parish Life","Loyalty","Rootedness"] },
  { id:"dream",      label:"The Dream",     angle:110,  color:"#6DBF8A", icon:"◬",
    children:["Off-Grid Homestead","Self-Sufficiency","Land & Nature","Building Things","Intentional Living","Freedom from Systems"] },
  { id:"fitness",    label:"Fitness",       angle:150,  color:"#8FC9A0", icon:"◎",
    children:["Home Calisthenics","Muscle & Weight Gain","Upper / Lower Split","Upper Delt Focus","Ankle Stability","6-Day Training Week"] },
  { id:"craft",      label:"Craft & Trade", angle:190,  color:"#D4A96A", icon:"⚡",
    children:["Electrician Career","Skilled Craftsmanship","Hands-On Work","Electrical Systems","Off-Grid Power ↗","Building w/ Purpose"] },
  { id:"values",     label:"Values & Mind", angle:230,  color:"#A8B8D4", icon:"◇",
    children:["Intellectual Rigor","Source Integrity","Critical Thinking","Faith ↔ Reason","Scholarly Depth","Lifelong Learning"] },
];

const CX = 470, CY = 470, BR = 175, LR = 315, SPREAD = 30;
const ZOOM_FOCUS_R = 235, ZOOM_SCALE = 2.15;

let activeId = null;

function polar(deg, r) {
  const rad = deg * Math.PI / 180;
  return { x: Math.cos(rad) * r, y: Math.sin(rad) * r };
}

// ── SVG namespace helper ────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ── Build the entire SVG once ───────────────────────────────────────
function buildSVG() {
  const svg = svgEl('svg', { viewBox: '0 0 940 940' });

  // ── defs ──────────────────────────────────────────────────────────
  const defs = svgEl('defs');

  DATA.forEach(b => {
    const grad = svgEl('radialGradient', { id: `g-${b.id}`, cx:'50%', cy:'50%', r:'50%' });
    const s0 = svgEl('stop', { offset:'0%', 'stop-color': b.color, 'stop-opacity':'0.32' });
    const s1 = svgEl('stop', { offset:'100%', 'stop-color': b.color, 'stop-opacity':'0' });
    grad.append(s0, s1);
    defs.appendChild(grad);
  });

  const cg = svgEl('radialGradient', { id:'cg', cx:'50%', cy:'50%', r:'50%' });
  cg.append(
    svgEl('stop', { offset:'0%', 'stop-color':'#C9A84C', 'stop-opacity':'0.38' }),
    svgEl('stop', { offset:'100%', 'stop-color':'#C9A84C', 'stop-opacity':'0' })
  );
  defs.appendChild(cg);

  const filt = svgEl('filter', { id:'sg', x:'-40%', y:'-40%', width:'180%', height:'180%' });
  const blur = svgEl('feGaussianBlur', { stdDeviation:'3', result:'b' });
  const merge = svgEl('feMerge');
  merge.append(svgEl('feMergeNode', { in:'b' }), svgEl('feMergeNode', { in:'SourceGraphic' }));
  filt.append(blur, merge);
  defs.appendChild(filt);
  svg.appendChild(defs);

  // ── bg click rect (outside zoom group so it stays put) ─────────────
  const bgRect = svgEl('rect', { id:'bg-rect', x:'0', y:'0', width:'940', height:'940', fill:'transparent' });
  bgRect.style.cursor = 'default';
  bgRect.addEventListener('click', () => toggle(null));
  svg.appendChild(bgRect);

  // ── zoom group ─────────────────────────────────────────────────────
  const zg = svgEl('g', { id:'zoom-group' });
  svg.appendChild(zg);

  // background rings
  [78, 152, 232, 316].forEach(r => {
    zg.appendChild(svgEl('circle', { cx:CX, cy:CY, r, fill:'none', stroke:'#ffffff06', 'stroke-width':'1' }));
  });

  // ── lines layer ────────────────────────────────────────────────────
  DATA.forEach(b => {
    const bp = polar(b.angle, BR);
    const bx = CX + bp.x, by = CY + bp.y;

    const grp = svgEl('g', { id:`lines-${b.id}` });

    // glow circle (starts hidden)
    grp.appendChild(svgEl('circle', { id:`glow-${b.id}`, cx:bx, cy:by, r:80,
      fill:`url(#g-${b.id})`, opacity:'0' }));

    // main line
    grp.appendChild(svgEl('line', { id:`line-${b.id}`, x1:CX, y1:CY, x2:bx, y2:by,
      stroke:b.color, 'stroke-width':'1.5', 'stroke-opacity':'0.35' }));

    // leaf lines
    const llg = svgEl('g', { id:`lleaf-${b.id}` });
    b.children.forEach((_, i) => {
      const sa = b.angle - (SPREAD * (b.children.length - 1)) / 2;
      const lp = polar(sa + i * SPREAD, LR);
      llg.appendChild(svgEl('line', { x1:bx, y1:by, x2:CX+lp.x, y2:CY+lp.y,
        stroke:b.color, 'stroke-width':'1.2', 'stroke-opacity':'0.14' }));
    });
    grp.appendChild(llg);
    zg.appendChild(grp);
  });

  // craft-dream arc
  const dream = DATA.find(b => b.id==='dream'), craft = DATA.find(b => b.id==='craft');
  const dp = polar(dream.angle, BR), cp = polar(craft.angle, BR);
  const dx = CX+dp.x, dy = CY+dp.y, cx2 = CX+cp.x, cy2 = CY+cp.y;
  const mx = (dx+cx2)/2*0.82 + CX*0.18, my = (dy+cy2)/2*0.82 + CY*0.18;
  zg.appendChild(svgEl('path', { id:'arc-dc',
    d:`M ${dx} ${dy} Q ${mx} ${my} ${cx2} ${cy2}`,
    stroke:'#A0C8B0', 'stroke-width':'1', fill:'none',
    'stroke-opacity':'0.22', 'stroke-dasharray':'5 4' }));

  // center node
  zg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:76, fill:'url(#cg)' }));
  zg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:54, fill:'#0B0D16',
    stroke:'#C9A84C', 'stroke-width':'1.8', 'stroke-opacity':'0.9' }));
  zg.appendChild(svgEl('circle', { cx:CX, cy:CY, r:46, fill:'none',
    stroke:'#C9A84C', 'stroke-width':'0.6', 'stroke-opacity':'0.3' }));
  const ct1 = svgEl('text', { x:CX, y:CY-8, 'text-anchor':'middle', fill:'#EAE6DA',
    'font-size':'21', 'font-family':'Georgia,serif', 'letter-spacing':'1' });
  ct1.textContent = 'Keiji';
  zg.appendChild(ct1);
  const ct2 = svgEl('text', { x:CX, y:CY+14, 'text-anchor':'middle', fill:'#C9A84C',
    'font-size':'10', 'letter-spacing':'3.5' });
  ct2.textContent = '✦ ✦ ✦';
  zg.appendChild(ct2);

  // ── branch + leaf nodes ────────────────────────────────────────────
  DATA.forEach(b => {
    const bp = polar(b.angle, BR);
    const bx = CX + bp.x, by = CY + bp.y;

    const bg = svgEl('g', { id:`branch-${b.id}` });
    bg.style.cursor = 'pointer';
    bg.addEventListener('click', e => { e.stopPropagation(); toggle(b.id); });

    // branch circle
    bg.appendChild(svgEl('circle', { id:`bcircle-${b.id}`, cx:bx, cy:by, r:30,
      fill:'#0F1120', stroke:b.color, 'stroke-width':'1.5', 'stroke-opacity':'0.65' }));
    document.getElementById(`bcircle-${b.id}`); // just reference

    // icon
    const icon = svgEl('text', { id:`bicon-${b.id}`, x:bx, y:by-7,
      'text-anchor':'middle', fill:b.color, 'font-size':'13',
      'pointer-events':'none' });
    icon.textContent = b.icon;
    bg.appendChild(icon);

    // label (split if multi-word)
    if (b.label.includes(' ')) {
      const words = b.label.split(' ');
      const mid = Math.ceil(words.length / 2);
      [[words.slice(0,mid).join(' '), by+7], [words.slice(mid).join(' '), by+16]].forEach(([txt, y]) => {
        const t = svgEl('text', { 'class':'blabel', 'data-bid':b.id, x:bx, y,
          'text-anchor':'middle', fill:'#9A9790',
          'font-size':'7', 'font-family':'Georgia,serif', 'letter-spacing':'0.4',
          'pointer-events':'none' });
        t.textContent = txt;
        bg.appendChild(t);
      });
    } else {
      const t = svgEl('text', { 'class':'blabel', 'data-bid':b.id, x:bx, y:by+10,
        'text-anchor':'middle', fill:'#9A9790',
        'font-size':'7.5', 'font-family':'Georgia,serif', 'letter-spacing':'0.4',
        'pointer-events':'none' });
      t.textContent = b.label;
      bg.appendChild(t);
    }

    // leaves group
    const lg = svgEl('g', { id:`bleaves-${b.id}`, opacity:'0.28' });
    lg.style.transition = 'opacity 0.35s';

    b.children.forEach((child, i) => {
      const sa = b.angle - (SPREAD * (b.children.length - 1)) / 2;
      const lp = polar(sa + i * SPREAD, LR);
      const lx = CX + lp.x, ly = CY + lp.y;
      const anchor = lp.x > 10 ? 'start' : lp.x < -10 ? 'end' : 'middle';
      const ox = lp.x > 10 ? 10 : lp.x < -10 ? -10 : 0;
      const oy = lp.y > 10 ? 10 : lp.y < -10 ? -5 : 4;

      const leaf = svgEl('g');
      leaf.appendChild(svgEl('circle', { cx:lx, cy:ly, r:4, fill:b.color, opacity:'0.9' }));
      const lt = svgEl('text', { x:lx+ox, y:ly+oy, 'text-anchor':anchor,
        fill:'#5A5850', 'font-size':'8', 'font-family':'Georgia,serif', 'letter-spacing':'0.3' });
      lt.textContent = child;
      leaf.appendChild(lt);
      lg.appendChild(leaf);
    });

    bg.appendChild(lg);
    zg.appendChild(bg);
  });

  document.getElementById('svg-container').appendChild(svg);
}

// ── Update visual state (zoom + colors) without recreating elements ──
function updateState() {
  // Zoom transform on group
  const zg = document.getElementById('zoom-group');
  if (activeId) {
    const b = DATA.find(x => x.id === activeId);
    const pt = polar(b.angle, ZOOM_FOCUS_R);
    const fx = CX + pt.x, fy = CY + pt.y;
    zg.style.transform = `translate(${CX}px,${CY}px) scale(${ZOOM_SCALE}) translate(${-fx}px,${-fy}px)`;
  } else {
    zg.style.transform = 'translate(0px,0px) scale(1)';
  }

  // Background rect cursor
  document.getElementById('bg-rect').style.cursor = activeId ? 'zoom-out' : 'default';

  // Header subtitle
  const sub = document.getElementById('header-subtitle');
  if (activeId) {
    const b = DATA.find(x => x.id === activeId);
    sub.textContent = `${b.icon}  ${b.label.toUpperCase()}  ${b.icon}`;
    sub.style.color = b.color;
  } else {
    sub.textContent = 'tap a branch to zoom in';
    sub.style.color = '#383530';
  }

  // Arc opacity
  document.getElementById('arc-dc').setAttribute('stroke-opacity', activeId ? '0.12' : '0.22');

  // Per-branch updates
  DATA.forEach(b => {
    const isActive = activeId === b.id;
    const isDimmed = activeId !== null && !isActive;

    // Glow circle
    document.getElementById(`glow-${b.id}`).setAttribute('opacity', isActive ? '1' : '0');

    // Main line
    const line = document.getElementById(`line-${b.id}`);
    line.setAttribute('stroke-width', isActive ? '2.2' : '1.5');
    line.setAttribute('stroke-opacity', isActive ? '0.95' : activeId ? '0.15' : '0.35');

    // Leaf lines
    document.getElementById(`lleaf-${b.id}`).querySelectorAll('line').forEach(l => {
      l.setAttribute('stroke-opacity', isActive ? '0.55' : activeId ? '0.05' : '0.14');
    });

    // Branch circle
    const bc = document.getElementById(`bcircle-${b.id}`);
    bc.setAttribute('r', isActive ? '35' : '30');
    bc.setAttribute('fill', isActive ? b.color + '28' : '#0F1120');
    bc.setAttribute('stroke-opacity', isDimmed ? '0.2' : isActive ? '1' : '0.65');
    bc.setAttribute('filter', isActive ? 'url(#sg)' : '');

    // Icon
    document.getElementById(`bicon-${b.id}`).setAttribute('fill', isDimmed ? b.color + '44' : b.color);

    // Labels
    document.querySelectorAll(`.blabel[data-bid="${b.id}"]`).forEach(t => {
      t.setAttribute('fill', isDimmed ? '#444' : isActive ? '#EAE6DA' : '#9A9790');
    });

    // Leaves group + leaf text color
    const leavesGrp = document.getElementById(`bleaves-${b.id}`);
    leavesGrp.setAttribute('opacity', isActive ? '1' : activeId ? '0.08' : '0.28');
    leavesGrp.querySelectorAll('text').forEach(t => {
      t.setAttribute('fill', isActive ? '#D0CCC0' : '#5A5850');
    });
  });

  renderLegend();
}

// ── Legend ───────────────────────────────────────────────────────────
function renderLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  DATA.forEach(b => {
    const isActive = activeId === b.id;
    const isDimmed = activeId !== null && !isActive;
    const pill = document.createElement('div');
    pill.className = 'legend-pill';
    pill.style.borderColor  = isActive ? b.color : activeId ? b.color + '20' : b.color + '40';
    pill.style.background   = isActive ? b.color + '18' : 'transparent';
    pill.style.opacity      = isDimmed ? '0.45' : '1';
    pill.innerHTML = `
      <span style="color:${b.color};font-size:11px">${b.icon}</span>
      <span style="color:${isActive ? '#EAE6DA' : '#706E66'};font-size:9px;font-family:Georgia,serif;letter-spacing:0.4px">${b.label}</span>`;
    pill.addEventListener('click', () => toggle(b.id));
    legend.appendChild(pill);
  });
}

function toggle(id) {
  activeId = (id === null || activeId === id) ? null : id;
  updateState();
}

buildSVG();
updateState();
</script>
</body>
</html>
