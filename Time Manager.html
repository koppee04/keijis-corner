<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Manager</title>
<style>
  :root {
    --bg: #040810;
    --surface: #080e1c;
    --surface2: #0c1424;
    --border: #1a2840;
    --accent: #5599dd;
    --accent-dim: #1a3a6a;
    --text: #5599dd;
    --text-muted: #e06500;
    --danger: #dd3344;
    --warning: #e06500;
    --success: #2eaa6a;
    --radius: 3px;
    --radius-sm: 2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    font-family: 'Consolas', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
    display: flex;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 12px;
    gap: 4px;
  }

  #sidebar h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    padding: 0 8px 16px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    padding: 12px 8px 4px;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    text-align: left;
    width: 100%;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--accent-dim); color: #fff; }
  .nav-btn .badge {
    margin-left: auto;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    border-radius: 10px;
    padding: 1px 7px;
  }

  #project-list { display: flex; flex-direction: column; gap: 2px; }

  .project-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .project-nav-item:hover { background: var(--surface2); color: var(--text); }
  .project-nav-item.active { background: var(--accent-dim); color: #fff; }
  .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .project-nav-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-nav-count { font-size: 11px; color: var(--text-muted); }

  #add-project-btn {
    margin-top: 4px;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 10px;
  }
  #add-project-btn:hover { color: var(--accent); }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  #view-title { font-size: 20px; font-weight: 700; flex: 1; }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }

  #content { flex: 1; overflow-y: auto; padding: 24px 28px; }

  /* ── Dashboard ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.warning { color: var(--warning); }
  .stat-value.success { color: var(--success); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── Task list ── */
  .task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
  }
  .task-card:hover { border-color: var(--accent-dim); }
  .task-card.done { opacity: 0.45; }

  .task-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .task-check:hover { border-color: var(--success); }
  .task-check.checked { background: var(--success); border-color: var(--success); }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-name.done { text-decoration: line-through; }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .tag-project { background: var(--accent-dim); color: var(--accent); }
  .tag-high { background: rgba(204,34,51,0.12); color: var(--danger); }
  .tag-medium { background: rgba(168,94,0,0.12); color: var(--warning); }
  .tag-low { background: rgba(30,128,80,0.12); color: var(--success); }

  .due-date {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .due-date.overdue { color: var(--danger); font-weight: 600; }
  .due-date.today { color: var(--warning); font-weight: 600; }

  .task-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .task-card:hover .task-actions { opacity: 1; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.del:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Projects view ── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .project-card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }

  .project-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .project-card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .project-card-name { font-size: 15px; font-weight: 700; flex: 1; }
  .project-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .project-card:hover .project-card-actions { opacity: 1; }

  .project-card-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; min-height: 18px; }

  .project-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .project-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .project-stats { font-size: 11px; color: var(--text-muted); }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
  }

  #modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 9px 12px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 70px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── Color picker ── */
  .color-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
  }
  .color-swatch.selected { border-color: #fff; }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent-dim); border-color: var(--accent-dim); color: #fff; }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    padding: 5px 14px;
    font-size: 12px;
    outline: none;
    margin-left: auto;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Mobile sidebar toggle ── */
  #sidebar-toggle {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  #sidebar-toggle:hover { background: var(--surface2); }

  #sidebar-scrim {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
  }

  /* JS adds .mobile-layout to body when narrow */
  body.mobile-layout #sidebar-toggle { display: block; }

  body.mobile-layout #sidebar {
    position: fixed;
    left: 0; top: 0;
    height: 100%;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    box-shadow: 4px 0 24px rgba(0,0,0,0.35);
    overflow-y: auto;
  }

  body.mobile-layout.sidebar-open #sidebar       { transform: translateX(0); }
  body.mobile-layout.sidebar-open #sidebar-scrim { display: block; }

  body.mobile-layout #main         { width: 100%; }
  body.mobile-layout .stats-row    { grid-template-columns: repeat(2, 1fr); }
  body.mobile-layout #topbar       { padding: 10px 14px; }
  body.mobile-layout #content      { padding: 14px; }
  body.mobile-layout .search-input { width: 120px; }

  /* ── Notes area ── */
  #notes-area {
    width: 100%;
    min-height: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  #notes-area:focus { border-color: var(--accent); }
  .notes-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  .task-notes-preview {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 400px;
  }
</style>
</head>
<body>

<div id="sidebar-scrim" onclick="closeSidebar()"></div>
<nav id="sidebar">
  <h1>⏱ TimeManager</h1>

  <span class="nav-section">Views</span>
  <button class="nav-btn active" onclick="setView(&#39;dashboard&#39;)" id="nav-dashboard">
    📊 Dashboard
  </button>
  <button class="nav-btn" onclick="setView(&#39;all-tasks&#39;)" id="nav-all-tasks">

    <span class="badge" id="badge-tasks">0</span>
  </button>
  <button class="nav-btn" onclick="setView(&#39;projects&#39;)" id="nav-projects">
    📁 Projects
  </button>
  <button class="nav-btn" onclick="setView(&#39;notes&#39;)" id="nav-notes">
    📝 Notes
  </button>

  <span class="nav-section">Projects</span>
  <div id="project-list"></div>
  <button class="nav-btn" id="add-project-btn" onclick="openProjectModal()">+ Add Project</button>
</nav>

<div id="main">
  <div id="topbar">
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <button class="btn btn-primary" id="topbar-action" onclick="openTaskModal()" style="">+ Add Task</button>
  </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Open Tasks</div>
        <div class="stat-value accent">0</div>

      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value success">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Due Today</div>
        <div class="stat-value success">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value success">0</div>
      </div>
    </div>

    

    

    <div class="empty">No open tasks — add one to get started!</div>

</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <h2 id="modal-title">New Task</h2>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const COLORS = ['#6c8cff','#ff5e6c','#f5a623','#4caf8a','#b04caf','#4cafd4','#f5623e','#a8d44c'];

function load() {
  return JSON.parse(localStorage.getItem('tm_data') || 'null') || {
    projects: [],
    tasks: [],
    notes: '',
  };
}
function save(data) {
  localStorage.setItem('tm_data', JSON.stringify(data));
}

let state = load();
let currentView = 'dashboard';
let editingId = null;
let filterProject = null;
let filterStatus = 'open';
let filterPriority = null;
let searchQuery = '';

// ── Sidebar toggle (mobile) ────────────────────────────
function checkMobile() {
  const narrow = window.innerWidth < 860;
  document.body.classList.toggle('mobile-layout', narrow);
  if (!narrow) document.body.classList.remove('sidebar-open');
}
function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
function closeSidebar()  { document.body.classList.remove('sidebar-open'); }
window.addEventListener('resize', checkMobile);
checkMobile();

// ── Routing ────────────────────────────────────────────
function setView(view, projectId = null) {
  closeSidebar();
  currentView = view;
  filterProject = projectId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.project-nav-item').forEach(b => b.classList.remove('active'));

  const navMap = { dashboard: 'nav-dashboard', 'all-tasks': 'nav-all-tasks', projects: 'nav-projects', notes: 'nav-notes' };
  if (navMap[view]) document.getElementById(navMap[view])?.classList.add('active');
  if (projectId) document.getElementById('proj-nav-' + projectId)?.classList.add('active');

  render();
}

// ── Render ─────────────────────────────────────────────
function render() {
  renderSidebar();
  const titles = {
    dashboard: 'Dashboard',
    'all-tasks': 'All Tasks',
    projects: 'Projects',
    notes: 'Notes',
  };
  let title = titles[currentView] || '';
  let actionLabel = '+ Add Task';
  let actionFn = 'openTaskModal()';

  if (currentView === 'projects' && !filterProject) {
    actionLabel = '+ New Project';
    actionFn = 'openProjectModal()';
  }
  if (currentView === 'notes') {
    actionLabel = null;
  }
  if (filterProject) {
    const p = state.projects.find(p => p.id === filterProject);
    title = p ? p.name : 'Project';
  }

  document.getElementById('view-title').textContent = title;
  const btn = document.getElementById('topbar-action');
  if (actionLabel) {
    btn.textContent = actionLabel;
    btn.onclick = new Function(actionFn);
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }

  const content = document.getElementById('content');
  if (currentView === 'dashboard') content.innerHTML = renderDashboard();
  else if (currentView === 'all-tasks') content.innerHTML = renderTasksView();
  else if (currentView === 'projects' && !filterProject) content.innerHTML = renderProjectsView();
  else if (filterProject) content.innerHTML = renderProjectDetail();
  else if (currentView === 'notes') content.innerHTML = renderNotesView();

  attachTaskEvents();
}

function renderSidebar() {
  const list = document.getElementById('project-list');
  const open = state.tasks.filter(t => !t.done);
  document.getElementById('badge-tasks').textContent = open.length;

  list.innerHTML = state.projects.map(p => {
    const count = state.tasks.filter(t => t.projectId === p.id && !t.done).length;
    return `<div class="project-nav-item" id="proj-nav-${p.id}" onclick="setView('project', '${p.id}')">
      <span class="project-dot" style="background:${p.color}"></span>
      <span class="project-nav-name">${esc(p.name)}</span>
      ${count > 0 ? `<span class="project-nav-count">${count}</span>` : ''}
    </div>`;
  }).join('');

  if (filterProject) {
    document.getElementById('proj-nav-' + filterProject)?.classList.add('active');
  }
}

// ── Dashboard ──────────────────────────────────────────
function renderDashboard() {
  const now = new Date(); now.setHours(0,0,0,0);
  const tasks = state.tasks;
  const open = tasks.filter(t => !t.done);
  const overdue = open.filter(t => t.dueDate && new Date(t.dueDate) < now);
  const dueToday = open.filter(t => t.dueDate && sameDay(new Date(t.dueDate), now));
  const done = tasks.filter(t => t.done);

  const upcoming = [...open]
    .filter(t => t.dueDate)
    .sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate))
    .slice(0, 8);

  const highPri = open.filter(t => t.priority === 'high').slice(0, 5);
  const noDate = open.filter(t => !t.dueDate).slice(0, 5);

  return `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Open Tasks</div>
        <div class="stat-value accent">${open.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value ${overdue.length > 0 ? 'danger' : 'success'}">${overdue.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Due Today</div>
        <div class="stat-value ${dueToday.length > 0 ? 'warning' : 'success'}">${dueToday.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value success">${done.length}</div>
      </div>
    </div>

    ${upcoming.length > 0 ? `
    <div class="section-header">
      <span class="section-title">Upcoming</span>
    </div>
    <div class="task-list">${upcoming.map(renderTask).join('')}</div>
    ` : ''}

    ${highPri.length > 0 ? `
    <div class="section-header">
      <span class="section-title">High Priority</span>
    </div>
    <div class="task-list">${highPri.map(renderTask).join('')}</div>
    ` : ''}

    ${open.length === 0 ? '<div class="empty">No open tasks — add one to get started!</div>' : ''}
  `;
}

// ── Tasks View ─────────────────────────────────────────
function renderTasksView() {
  return renderTaskListWithFilters(state.tasks);
}

function renderProjectDetail() {
  const p = state.projects.find(p => p.id === filterProject);
  if (!p) return '<div class="empty">Project not found.</div>';
  const tasks = state.tasks.filter(t => t.projectId === filterProject);
  return renderTaskListWithFilters(tasks);
}

function renderTaskListWithFilters(allTasks) {
  let tasks = allTasks;
  if (filterStatus === 'open') tasks = tasks.filter(t => !t.done);
  if (filterStatus === 'done') tasks = tasks.filter(t => t.done);
  if (filterPriority) tasks = tasks.filter(t => t.priority === filterPriority);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    tasks = tasks.filter(t => t.name.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q));
  }
  tasks = tasks.sort((a,b) => {
    const pd = {'high':0,'medium':1,'low':2};
    if (!a.done && b.done) return -1;
    if (a.done && !b.done) return 1;
    if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return (pd[a.priority]||1) - (pd[b.priority]||1);
  });

  return `
    <div class="filter-bar">
      <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="setFilter('status','all')">All</button>
      <button class="filter-btn ${filterStatus==='open'?'active':''}" onclick="setFilter('status','open')">Open</button>
      <button class="filter-btn ${filterStatus==='done'?'active':''}" onclick="setFilter('status','done')">Done</button>
      <button class="filter-btn ${filterPriority==='high'?'active':''}" onclick="setFilter('priority','high')">🔴 High</button>
      <button class="filter-btn ${filterPriority==='medium'?'active':''}" onclick="setFilter('priority','medium')">🟡 Medium</button>
      <button class="filter-btn ${filterPriority==='low'?'active':''}" onclick="setFilter('priority','low')">🟢 Low</button>
      <input class="search-input" placeholder="Search..." value="${esc(searchQuery)}" oninput="setSearch(this.value)">
    </div>
    <div class="task-list">
      ${tasks.length > 0 ? tasks.map(renderTask).join('') : '<div class="empty">No tasks match your filters.</div>'}
    </div>
  `;
}

function setFilter(type, val) {
  if (type === 'status') {
    filterStatus = val;
    filterPriority = null;
  } else {
    filterPriority = filterPriority === val ? null : val;
  }
  render();
}

function setSearch(val) {
  searchQuery = val;
  render();
}

// ── Projects View ──────────────────────────────────────
function renderProjectsView() {
  if (state.projects.length === 0) return '<div class="empty">No projects yet. Create one to organize your tasks!</div>';
  return `<div class="projects-grid">${state.projects.map(renderProjectCard).join('')}</div>`;
}

function renderProjectCard(p) {
  const tasks = state.tasks.filter(t => t.projectId === p.id);
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  return `
    <div class="project-card" onclick="setView('project', '${p.id}')">
      <div class="project-card-header">
        <span class="project-card-dot" style="background:${p.color}"></span>
        <span class="project-card-name">${esc(p.name)}</span>
        <div class="project-card-actions" onclick="event.stopPropagation()">
          <button class="icon-btn" onclick="openProjectModal('${p.id}')">✏️</button>
          <button class="icon-btn del" onclick="deleteProject('${p.id}')">🗑</button>
        </div>
      </div>
      <div class="project-card-desc">${esc(p.description||'')}</div>
      <div class="project-progress-bar">
        <div class="project-progress-fill" style="width:${pct}%;background:${p.color}"></div>
      </div>
      <div class="project-stats">${done}/${total} tasks done · ${pct}%</div>
    </div>
  `;
}

// ── Notes View ─────────────────────────────────────────
function renderNotesView() {
  return `
    <div class="section-header">
      <span class="section-title">Scratch Pad</span>
      <span style="font-size:12px;color:var(--text-muted)">Auto-saves as you type</span>
    </div>
    <textarea id="notes-area" placeholder="Jot down thoughts, plans, ideas...">${esc(state.notes||'')}</textarea>
    <p class="notes-hint">Use this for brain dumps, weekly plans, anything you want to keep handy.</p>
  `;
}

// ── Task Card ──────────────────────────────────────────
function renderTask(t) {
  const proj = state.projects.find(p => p.id === t.projectId);
  const now = new Date(); now.setHours(0,0,0,0);
  let dueCls = '', dueLabel = '';
  if (t.dueDate) {
    const d = new Date(t.dueDate);
    const diff = Math.round((d - now) / 86400000);
    if (diff < 0) { dueCls = 'overdue'; dueLabel = `Overdue ${-diff}d`; }
    else if (diff === 0) { dueCls = 'today'; dueLabel = 'Today'; }
    else if (diff === 1) dueLabel = 'Tomorrow';
    else dueLabel = fmtDate(t.dueDate);
  }
  const priTag = t.priority ? `<span class="tag tag-${t.priority}">${t.priority}</span>` : '';
  const projTag = proj ? `<span class="tag tag-project" style="background:${proj.color}22;color:${proj.color}">${esc(proj.name)}</span>` : '';

  return `<div class="task-card ${t.done?'done':''}" data-id="${t.id}">
    <div class="task-check ${t.done?'checked':''}" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body">
      <div class="task-name ${t.done?'done':''}">${esc(t.name)}</div>
      ${t.notes ? `<div class="task-notes-preview">${esc(t.notes)}</div>` : ''}
      <div class="task-meta">
        ${priTag}${projTag}
        ${dueLabel ? `<span class="due-date ${dueCls}">📅 ${dueLabel}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openTaskModal('${t.id}')">✏️</button>
      <button class="icon-btn del" onclick="deleteTask('${t.id}')">🗑</button>
    </div>
  </div>`;
}

function attachTaskEvents() {
  const notes = document.getElementById('notes-area');
  if (notes) {
    notes.addEventListener('input', () => {
      state.notes = notes.value;
      save(state);
    });
  }
}

// ── Task CRUD ──────────────────────────────────────────
function toggleTask(id) {
  const t = state.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(state); render(); }
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(state); render();
}

function openTaskModal(id = null) {
  editingId = id;
  const t = id ? state.tasks.find(t => t.id === id) : null;
  document.getElementById('modal-title').textContent = t ? 'Edit Task' : 'New Task';

  const projOptions = state.projects.map(p =>
    `<option value="${p.id}" ${t?.projectId===p.id?'selected':''}>${esc(p.name)}</option>`
  ).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>Task Name *</label>
      <input id="f-name" type="text" placeholder="What needs to be done?" value="${esc(t?.name||'')}">
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Add details...">${esc(t?.notes||'')}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input id="f-due" type="date" value="${t?.dueDate||''}">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="">None</option>
          <option value="low" ${t?.priority==='low'?'selected':''}>Low</option>
          <option value="medium" ${t?.priority==='medium'?'selected':''}>Medium</option>
          <option value="high" ${t?.priority==='high'?'selected':''}>High</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Project</label>
      <select id="f-project">
        <option value="">No project</option>
        ${projOptions}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  `;

  if (!t && filterProject) {
    const sel = document.getElementById('f-project');
    if (sel) sel.value = filterProject;
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name')?.focus(), 50);
}

function saveTask() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Task name is required.'); return; }

  const data = {
    name,
    notes: document.getElementById('f-notes').value.trim(),
    dueDate: document.getElementById('f-due').value,
    priority: document.getElementById('f-priority').value,
    projectId: document.getElementById('f-project').value || null,
  };

  if (editingId) {
    Object.assign(state.tasks.find(t => t.id === editingId), data);
  } else {
    state.tasks.push({ id: uid(), done: false, createdAt: Date.now(), ...data });
  }

  save(state); closeModal(); render();
}

// ── Project CRUD ───────────────────────────────────────
function openProjectModal(id = null) {
  editingId = id;
  const p = id ? state.projects.find(p => p.id === id) : null;
  document.getElementById('modal-title').textContent = p ? 'Edit Project' : 'New Project';

  const curColor = p?.color || COLORS[state.projects.length % COLORS.length];

  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>Project Name *</label>
      <input id="f-pname" type="text" placeholder="e.g. Work, Health, Side Project..." value="${esc(p?.name||'')}">
    </div>
    <div class="form-group">
      <label>Description</label>
      <input id="f-pdesc" type="text" placeholder="Optional description" value="${esc(p?.description||'')}">
    </div>
    <div class="form-group">
      <label>Color</label>
      <div class="color-options" id="color-picker">
        ${COLORS.map(c => `<div class="color-swatch ${c===curColor?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')"></div>`).join('')}
      </div>
      <input type="hidden" id="f-color" value="${curColor}">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-pname')?.focus(), 50);
}

function selectColor(c) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.querySelector(`[data-color="${c}"]`)?.classList.add('selected');
  document.getElementById('f-color').value = c;
}

function saveProject() {
  const name = document.getElementById('f-pname').value.trim();
  if (!name) { alert('Project name is required.'); return; }

  const data = {
    name,
    description: document.getElementById('f-pdesc').value.trim(),
    color: document.getElementById('f-color').value,
  };

  if (editingId) {
    Object.assign(state.projects.find(p => p.id === editingId), data);
  } else {
    state.projects.push({ id: uid(), createdAt: Date.now(), ...data });
  }

  save(state); closeModal(); render();
}

function deleteProject(id) {
  const p = state.projects.find(p => p.id === id);
  const taskCount = state.tasks.filter(t => t.projectId === id).length;
  const msg = taskCount > 0
    ? `Delete "${p.name}" and unlink its ${taskCount} task(s)?`
    : `Delete project "${p.name}"?`;
  if (!confirm(msg)) return;
  state.projects = state.projects.filter(p => p.id !== id);
  state.tasks.forEach(t => { if (t.projectId === id) t.projectId = null; });
  if (filterProject === id) { filterProject = null; currentView = 'projects'; }
  save(state); render();
}

// ── Modal ──────────────────────────────────────────────
function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

// ── Helpers ────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sameDay(a, b) { return a.toDateString() === b.toDateString(); }
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── Keyboard shortcuts ─────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey) {
    if (document.getElementById('modal-overlay').classList.contains('open')) {
      const saveBtn = document.querySelector('#modal .btn-primary');
      if (saveBtn) saveBtn.click();
    }
  }
  if (!document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      openTaskModal();
    }
  }
});

// ── Boot ───────────────────────────────────────────────
render();
</script>


</body></html>
