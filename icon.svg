<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <clipPath id="rnd"><rect width="512" height="512" rx="72"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="#2a3a50"/>
  <!-- Pixel-grid texture -->
  <rect width="512" height="512" fill="url(#g)" clip-path="url(#rnd)"/>

  <!-- Orange top bar -->
  <rect x="0" y="0" width="512" height="68" fill="#e06500" clip-path="url(#rnd)"/>
  <!-- Thin dark separator under orange bar -->
  <rect x="0" y="64" width="512" height="4" fill="#8a3c00"/>

  <!-- Blue corner brackets -->
  <!-- Top-left -->
  <rect x="40" y="100" width="44" height="8" fill="#5599cc"/>
  <rect x="40" y="100" width="8" height="44" fill="#5599cc"/>
  <!-- Bottom-right -->
  <rect x="428" y="404" width="44" height="8" fill="#5599cc"/>
  <rect x="464" y="404" width="8" height="44" fill="#5599cc"/>

  <!-- ────────────────────────────────────────────────
       Pixel-art K  ·  7 cols × 9 rows  ·  24 px/cell
       x_start = (512 − 168) / 2 = 172
       y_start = 68 + (444 − 216) / 2 = 68 + 114 = 182
       Perfectly symmetric: arms reach col 6 on rows 0 and 8
       ──────────────────────────────────────────────── -->

  <!-- Row 0  (y=182): stem [0,1] + arm top [6] -->
  <rect x="172" y="182" width="48" height="24" fill="#f0f2f4"/>
  <rect x="316" y="182" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 1  (y=206): stem [0,1] + arm [5] -->
  <rect x="172" y="206" width="48" height="24" fill="#f0f2f4"/>
  <rect x="292" y="206" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 2  (y=230): stem [0,1] + arm [4] -->
  <rect x="172" y="230" width="48" height="24" fill="#f0f2f4"/>
  <rect x="268" y="230" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 3  (y=254): stem [0,1] + arm [3] -->
  <rect x="172" y="254" width="48" height="24" fill="#f0f2f4"/>
  <rect x="244" y="254" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 4  (y=278): spine — stem meets arm [0,1,2] -->
  <rect x="172" y="278" width="72" height="24" fill="#f0f2f4"/>

  <!-- Row 5  (y=302): stem [0,1] + arm [3] -->
  <rect x="172" y="302" width="48" height="24" fill="#f0f2f4"/>
  <rect x="244" y="302" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 6  (y=326): stem [0,1] + arm [4] -->
  <rect x="172" y="326" width="48" height="24" fill="#f0f2f4"/>
  <rect x="268" y="326" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 7  (y=350): stem [0,1] + arm [5] -->
  <rect x="172" y="350" width="48" height="24" fill="#f0f2f4"/>
  <rect x="292" y="350" width="24" height="24" fill="#f0f2f4"/>

  <!-- Row 8  (y=374): stem [0,1] + arm bottom [6] -->
  <rect x="172" y="374" width="48" height="24" fill="#f0f2f4"/>
  <rect x="316" y="374" width="24" height="24" fill="#f0f2f4"/>

  <!-- Orange star accent (top-right of icon, in the header bar) -->
  <text x="460" y="50" font-family="serif" font-size="38" text-anchor="middle" fill="rgba(255,255,255,0.85)">★</text>
</svg>
